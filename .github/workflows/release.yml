name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: mcpb-pack
        uses: NimbleBrainInc/mcpb-pack@v3
        with:
          output: document-converter.mcpb
          announce: false

      - name: Update server.json with bundle hash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          HASH="${{ steps.mcpb-pack.outputs.bundle-sha256 }}"
          jq --arg hash "$HASH" --arg version "$VERSION" \
            '.version = $version | .packages[0].version = $version | .packages[0].file_sha256 = $hash' \
            server.json > server.tmp.json
          mv server.tmp.json server.json
          cat server.json

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/v1.0.0/mcp-publisher_1.0.0_linux_amd64.tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
